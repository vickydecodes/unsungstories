
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>unsungstories</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black:   #0a0a0a;
      --offwhite: #f0ece4;
      --stone:   #8a8680;
      --ember:   #c9622f;
      --serif:   'Instrument Serif', Georgia, serif;
      --sans:    'Inter', sans-serif;
      --mono:    'DM Mono', monospace;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--offwhite);
      font-family: var(--sans);
      font-size: 16px;
      line-height: 1.6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ── HOMEPAGE ── */
    #home { display: block; }
    #reader { display: none; }

    /* NAV */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      background: linear-gradient(to bottom, rgba(10,10,10,0.98) 0%, transparent 100%);
    }

    .nav-brand {
      font-family: var(--serif);
      font-size: 1.25rem;
      color: var(--offwhite);
      letter-spacing: -0.01em;
      text-decoration: none;
      cursor: pointer;
    }

    .nav-brand span { color: var(--ember); }

    .nav-meta {
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--stone);
      font-weight: 300;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* HERO */
    .hero {
      padding: 180px 48px 80px;
      max-width: 860px;
    }

    .hero-eyebrow {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--ember);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-bottom: 24px;
      font-weight: 300;
    }

    .hero-title {
      font-family: var(--serif);
      font-size: clamp(3rem, 7vw, 5.5rem);
      line-height: 1.02;
      color: var(--offwhite);
      letter-spacing: -0.02em;
      margin-bottom: 20px;
    }

    .hero-title em {
      font-style: italic;
      color: var(--stone);
    }

    .hero-sub {
      font-size: 0.95rem;
      color: var(--stone);
      font-weight: 300;
      letter-spacing: 0.01em;
      max-width: 420px;
    }

    /* DIVIDER */
    .divider {
      height: 1px;
      background: rgba(240,236,228,0.07);
      margin: 0 48px;
    }

    /* STORIES GRID */
    .stories-section {
      padding: 64px 48px 120px;
    }

    .stories-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--stone);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 40px;
      font-weight: 300;
    }

    .stories-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2px;
    }

    /* STORY CARD */
    .story-card {
      position: relative;
      background: #111111;
      padding: 40px 36px;
      cursor: pointer;
      transition: background 0.2s ease;
      border: 1px solid transparent;
      overflow: hidden;
    }

    .story-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 3px;
      height: 0;
      background: var(--ember);
      transition: height 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .story-card:hover {
      background: #141414;
      border-color: rgba(201,98,47,0.12);
    }

    .story-card:hover::before { height: 100%; }

    .card-folder {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--ember);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 16px;
      font-weight: 300;
      opacity: 0.8;
    }

    .card-title {
      font-family: var(--serif);
      font-size: 1.55rem;
      line-height: 1.2;
      color: var(--offwhite);
      margin-bottom: 12px;
      letter-spacing: -0.01em;
    }

    .card-preview {
      font-size: 0.85rem;
      color: var(--stone);
      line-height: 1.65;
      font-weight: 300;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(240,236,228,0.06);
    }

    .card-chapters {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--stone);
      letter-spacing: 0.06em;
      font-weight: 300;
    }

    .card-arrow {
      font-size: 0.8rem;
      color: var(--ember);
      opacity: 0;
      transform: translateX(-6px);
      transition: opacity 0.2s, transform 0.2s;
    }

    .story-card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }

    /* CHAPTERS LIST (inside a story) */
    .chapters-view {
      padding: 160px 48px 80px;
      max-width: 760px;
    }

    .back-btn {
      font-family: var(--mono);
      font-size: 0.68rem;
      color: var(--stone);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      margin-bottom: 56px;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-btn:hover { color: var(--offwhite); }

    .chapters-story-title {
      font-family: var(--serif);
      font-size: clamp(2.2rem, 5vw, 3.8rem);
      line-height: 1.08;
      color: var(--offwhite);
      letter-spacing: -0.02em;
      margin-bottom: 12px;
    }

    .chapters-story-meta {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--stone);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 56px;
      font-weight: 300;
    }

    .chapter-item {
      display: flex;
      align-items: baseline;
      gap: 20px;
      padding: 20px 0;
      border-bottom: 1px solid rgba(240,236,228,0.05);
      cursor: pointer;
      transition: all 0.2s;
    }

    .chapter-item:hover .chapter-item-title { color: var(--offwhite); }
    .chapter-item:hover .chapter-item-num { color: var(--ember); }

    .chapter-item-num {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: rgba(138,134,128,0.5);
      min-width: 28px;
      transition: color 0.2s;
      letter-spacing: 0.04em;
    }

    .chapter-item-title {
      font-family: var(--serif);
      font-size: 1.2rem;
      color: var(--stone);
      transition: color 0.2s;
      letter-spacing: -0.01em;
    }

    .chapter-item-arrow {
      margin-left: auto;
      font-size: 0.75rem;
      color: var(--ember);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .chapter-item:hover .chapter-item-arrow { opacity: 1; }

    /* ── READER MODE ── */
    #reader {
      background: var(--black);
      min-height: 100vh;
    }

    .reader-nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 48px;
      background: linear-gradient(to bottom, rgba(10,10,10,1) 60%, transparent);
      opacity: 1;
      transition: opacity 0.4s;
    }

    .reader-nav.hidden { opacity: 0; pointer-events: none; }

    .reader-back {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--stone);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      transition: color 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .reader-back:hover { color: var(--offwhite); }

    .reader-chapter-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      color: var(--stone);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 300;
    }

    .reader-body {
      max-width: 640px;
      margin: 0 auto;
      padding: 140px 32px 120px;
    }

    .reader-chapter-title {
      font-family: var(--serif);
      font-size: clamp(2rem, 4vw, 3rem);
      line-height: 1.1;
      color: var(--offwhite);
      letter-spacing: -0.02em;
      margin-bottom: 56px;
    }

    .reader-content {
      font-family: var(--serif);
      font-size: 1.18rem;
      line-height: 1.85;
      color: #d8d4cc;
      letter-spacing: 0.008em;
    }

    .reader-content p { margin-bottom: 1.6em; }
    .reader-content h1, .reader-content h2, .reader-content h3 {
      font-family: var(--serif);
      color: var(--offwhite);
      margin: 2em 0 0.8em;
      letter-spacing: -0.01em;
      line-height: 1.2;
    }
    .reader-content h1 { font-size: 1.8rem; }
    .reader-content h2 { font-size: 1.4rem; }
    .reader-content h3 { font-size: 1.15rem; }
    .reader-content em { font-style: italic; color: var(--offwhite); }
    .reader-content strong { font-weight: 500; color: var(--offwhite); }
    .reader-content blockquote {
      border-left: 2px solid var(--ember);
      padding-left: 24px;
      margin: 2em 0;
      color: var(--stone);
      font-style: italic;
    }
    .reader-content hr {
      border: none;
      border-top: 1px solid rgba(240,236,228,0.1);
      margin: 3em auto;
      width: 60px;
    }

    /* Chapter nav at bottom */
    .reader-footer {
      max-width: 640px;
      margin: 0 auto;
      padding: 0 32px 80px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid rgba(240,236,228,0.06);
      padding-top: 40px;
    }

    .reader-nav-btn {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--stone);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      transition: color 0.2s;
    }

    .reader-nav-btn:hover { color: var(--ember); }
    .reader-nav-btn:disabled { opacity: 0.2; cursor: default; }
    .reader-nav-btn:disabled:hover { color: var(--stone); }

    /* LOADING */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 50vh;
      flex-direction: column;
      gap: 16px;
    }

    .loading-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--ember);
      animation: pulse 1.2s ease-in-out infinite;
    }

    .loading-dot:nth-child(2) { animation-delay: 0.2s; }
    .loading-dot:nth-child(3) { animation-delay: 0.4s; }

    .loading-dots { display: flex; gap: 6px; }

    .loading-text {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--stone);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* ERROR */
    .error-state {
      padding: 48px;
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--stone);
      letter-spacing: 0.06em;
    }

    .error-state a {
      color: var(--ember);
      text-decoration: none;
    }

    /* EMPTY */
    .empty-state {
      padding: 80px 48px;
      font-family: var(--serif);
      font-size: 1.4rem;
      color: var(--stone);
      font-style: italic;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: rgba(201,98,47,0.3); border-radius: 2px; }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      nav, .stories-section, .chapters-view { padding-left: 24px; padding-right: 24px; }
      .hero { padding: 140px 24px 60px; }
      .divider { margin: 0 24px; }
      .stories-grid { grid-template-columns: 1fr; gap: 1px; }
      .reader-nav { padding: 20px 24px; }
      .reader-body { padding: 120px 24px 80px; }
      .reader-footer { padding: 32px 24px 60px; }
    }

    /* Page transitions */
    .page { animation: fadeIn 0.35s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- HOME PAGE -->
<div id="home">
  <nav>
    <span class="nav-brand" onclick="goHome()">unsung<span>stories</span></span>
    <span class="nav-meta">github / vickydecodes</span>
  </nav>

  <div id="home-content">
    <div class="loading" style="padding-top: 160px;">
      <div class="loading-dots">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
      <p class="loading-text">fetching stories</p>
    </div>
  </div>
</div>

<!-- READER PAGE -->
<div id="reader">
  <nav class="reader-nav" id="reader-nav">
    <button class="reader-back" id="reader-back-btn">← back</button>
    <span class="reader-chapter-label" id="reader-label"></span>
  </nav>
  <div class="reader-body">
    <h1 class="reader-chapter-title" id="reader-title"></h1>
    <div class="reader-content" id="reader-content"></div>
  </div>
  <div class="reader-footer">
    <button class="reader-nav-btn" id="prev-btn" onclick="navigateChapter(-1)">← prev</button>
    <button class="reader-nav-btn" id="next-btn" onclick="navigateChapter(1)">next →</button>
  </div>
</div>

<script>
  const GITHUB_USER = 'vickydecodes';
  const GITHUB_REPO = 'unsungstories';
  const API = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}`;
  const RAW = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main`;

  let state = {
    view: 'home',       // 'home' | 'story' | 'reader'
    stories: [],
    currentStory: null,
    currentChapterIndex: 0,
  };

  // ── ROUTING ──
  function goHome() {
    state.view = 'home';
    state.currentStory = null;
    document.getElementById('reader').style.display = 'none';
    document.getElementById('home').style.display = 'block';
    renderHome();
    window.scrollTo(0, 0);
  }

  function goStory(story) {
    state.view = 'story';
    state.currentStory = story;
    document.getElementById('reader').style.display = 'none';
    document.getElementById('home').style.display = 'block';
    renderStoryView(story);
    window.scrollTo(0, 0);
  }

  function openChapter(story, chapterIndex) {
    state.view = 'reader';
    state.currentStory = story;
    state.currentChapterIndex = chapterIndex;
    document.getElementById('home').style.display = 'none';
    document.getElementById('reader').style.display = 'block';
    loadChapter(story, chapterIndex);
    window.scrollTo(0, 0);
  }

  // ── FETCH STORIES FROM GITHUB ──
  async function fetchStories() {
    try {
      const res = await fetch(`${API}/contents`, {
        headers: { 'Accept': 'application/vnd.github.v3+json' }
      });
      if (!res.ok) throw new Error(`GitHub API: ${res.status}`);
      const items = await res.json();

      // Folders = stories
      const folders = items.filter(i => i.type === 'dir' && !i.name.startsWith('.'));

      const stories = await Promise.all(folders.map(async folder => {
        const chapRes = await fetch(`${API}/contents/${folder.name}`, {
          headers: { 'Accept': 'application/vnd.github.v3+json' }
        });
        const chapItems = await chapRes.json();
        const chapters = chapItems
          .filter(i => i.type === 'file' && i.name.endsWith('.md'))
          .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }));

        return {
          name: folder.name,
          displayName: formatName(folder.name),
          path: folder.path,
          chapters,
          preview: null
        };
      }));

      // Fetch preview text from first chapter of each story
      await Promise.all(stories.map(async story => {
        if (story.chapters.length > 0) {
          try {
            const r = await fetch(`${RAW}/${story.name}/${story.chapters[0].name}`);
            const md = await r.text();
            story.preview = extractPreview(md);
          } catch {}
        }
      }));

      state.stories = stories;
      return stories;
    } catch (err) {
      return { error: err.message };
    }
  }

  function formatName(slug) {
    return slug.replace(/[-_]/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  function formatChapterName(filename) {
    return filename
      .replace(/\.md$/, '')
      .replace(/[-_]/g, ' ')
      .replace(/\b\w/g, c => c.toUpperCase());
  }

  function extractPreview(md) {
    // Strip markdown, get first ~200 chars of prose
    return md
      .replace(/^#+\s+.+$/gm, '')
      .replace(/\*\*(.+?)\*\*/g, '$1')
      .replace(/\*(.+?)\*/g, '$1')
      .replace(/\[(.+?)\]\(.+?\)/g, '$1')
      .replace(/^\s*[-*>]\s+/gm, '')
      .replace(/\n{2,}/g, ' ')
      .trim()
      .slice(0, 220)
      .trim() + '…';
  }

  // ── RENDER HOME ──
  async function renderHome() {
    const container = document.getElementById('home-content');

    container.innerHTML = `
      <div class="hero page">
        <p class="hero-eyebrow">stories that needed to be told</p>
        <h1 class="hero-title">words that<br><em>refused to stay quiet</em></h1>
        <p class="hero-sub">a personal archive. written in solitude, published to github, read here.</p>
      </div>
      <div class="divider"></div>
      <div class="stories-section">
        <p class="stories-label">all stories</p>
        <div class="stories-grid" id="stories-grid">
          <div class="loading">
            <div class="loading-dots">
              <div class="loading-dot"></div>
              <div class="loading-dot"></div>
              <div class="loading-dot"></div>
            </div>
            <p class="loading-text">fetching from github</p>
          </div>
        </div>
      </div>
    `;

    const result = await fetchStories();
    const grid = document.getElementById('stories-grid');
    if (!grid) return;

    if (result.error) {
      grid.innerHTML = `
        <div class="error-state">
          <p>couldn't reach github. check that <strong>${GITHUB_USER}/${GITHUB_REPO}</strong> is public.</p>
          <br><p style="opacity:0.5; margin-top:8px;">${result.error}</p>
        </div>`;
      return;
    }

    if (result.length === 0) {
      grid.innerHTML = `<div class="empty-state">No stories yet. Push a folder with .md files to begin.</div>`;
      return;
    }

    grid.innerHTML = result.map((story, i) => `
      <div class="story-card page" onclick="goStory(state.stories[${i}])">
        <div class="card-folder">${story.name}</div>
        <h2 class="card-title">${story.displayName}</h2>
        <p class="card-preview">${story.preview || 'Begin reading this story...'}</p>
        <div class="card-footer">
          <span class="card-chapters">${story.chapters.length} chapter${story.chapters.length !== 1 ? 's' : ''}</span>
          <span class="card-arrow">→</span>
        </div>
      </div>
    `).join('');
  }

  // ── RENDER STORY (chapter list) ──
  function renderStoryView(story) {
    const container = document.getElementById('home-content');
    container.innerHTML = `
      <div class="chapters-view page">
        <button class="back-btn" onclick="goHome()">← all stories</button>
        <h1 class="chapters-story-title">${story.displayName}</h1>
        <p class="chapters-story-meta">${story.chapters.length} chapter${story.chapters.length !== 1 ? 's' : ''} · ${story.name}</p>
        <div id="chapters-list">
          ${story.chapters.map((ch, i) => `
