<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>unsungstories</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
          <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
            <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
              <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
                <style>
                    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
                        :root{--black:#0a0a0a;--offwhite:#f0ece4;--stone:#8a8680;--ember:#c9622f;--serif:'Instrument Serif',Georgia,serif;--sans:'Inter',sans-serif;--mono:'DM Mono',monospace}
                            html{scroll-behavior:smooth}
                                body{background:var(--black);color:var(--offwhite);font-family:var(--sans);font-size:16px;line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased}
                                    #home{display:block}#reader{display:none}
                                        nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:24px 48px;background:linear-gradient(to bottom,rgba(10,10,10,.98) 0%,transparent 100%)}
                                            .nav-brand{font-family:var(--serif);font-size:1.25rem;color:var(--offwhite);letter-spacing:-.01em;cursor:pointer}
                                                .nav-brand span{color:var(--ember)}
                                                    .nav-meta{font-family:var(--mono);font-size:.7rem;color:var(--stone);font-weight:300;letter-spacing:.08em;text-transform:uppercase}
                                                        .hero{padding:180px 48px 80px;max-width:860px}
                                                            .hero-eyebrow{font-family:var(--mono);font-size:.68rem;color:var(--ember);letter-spacing:.14em;text-transform:uppercase;margin-bottom:24px;font-weight:300}
                                                                .hero-title{font-family:var(--serif);font-size:clamp(3rem,7vw,5.5rem);line-height:1.02;color:var(--offwhite);letter-spacing:-.02em;margin-bottom:20px}
                                                                    .hero-title em{font-style:italic;color:var(--stone)}
                                                                        .hero-sub{font-size:.95rem;color:var(--stone);font-weight:300;max-width:420px}
                                                                            .divider{height:1px;background:rgba(240,236,228,.07);margin:0 48px}
                                                                                .stories-section{padding:64px 48px 120px}
                                                                                    .stories-label{font-family:var(--mono);font-size:.65rem;color:var(--stone);letter-spacing:.12em;text-transform:uppercase;margin-bottom:40px;font-weight:300}
                                                                                        .stories-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:2px}
                                                                                            .story-card{position:relative;background:#111;padding:40px 36px;cursor:pointer;transition:background .2s;border:1px solid transparent;overflow:hidden}
                                                                                                .story-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:0;background:var(--ember);transition:height .35s cubic-bezier(.4,0,.2,1)}
                                                                                                    .story-card:hover{background:#141414;border-color:rgba(201,98,47,.12)}
                                                                                                        .story-card:hover::before{height:100%}
                                                                                                            .card-folder{font-family:var(--mono);font-size:.62rem;color:var(--ember);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px;font-weight:300;opacity:.8}
                                                                                                                .card-title{font-family:var(--serif);font-size:1.55rem;line-height:1.2;color:var(--offwhite);margin-bottom:12px;letter-spacing:-.01em}
                                                                                                                    .card-preview{font-size:.85rem;color:var(--stone);line-height:1.65;font-weight:300;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
                                                                                                                        .card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:28px;padding-top:20px;border-top:1px solid rgba(240,236,228,.06)}
                                                                                                                            .card-chapters{font-family:var(--mono);font-size:.62rem;color:var(--stone);letter-spacing:.06em;font-weight:300}
                                                                                                                                .card-arrow{font-size:.8rem;color:var(--ember);opacity:0;transform:translateX(-6px);transition:opacity .2s,transform .2s}
                                                                                                                                    .story-card:hover .card-arrow{opacity:1;transform:translateX(0)}
                                                                                                                                        .chapters-view{padding:160px 48px 80px;max-width:760px}
                                                                                                                                            .back-btn{font-family:var(--mono);font-size:.68rem;color:var(--stone);letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;background:none;padding:0;margin-bottom:56px;transition:color .2s;display:flex;align-items:center;gap:8px}
                                                                                                                                                .back-btn:hover{color:var(--offwhite)}
                                                                                                                                                    .chapters-story-title{font-family:var(--serif);font-size:clamp(2.2rem,5vw,3.8rem);line-height:1.08;color:var(--offwhite);letter-spacing:-.02em;margin-bottom:12px}
                                                                                                                                                        .chapters-story-meta{font-family:var(--mono);font-size:.65rem;color:var(--stone);letter-spacing:.08em;text-transform:uppercase;margin-bottom:56px;font-weight:300}
                                                                                                                                                            .chapter-item{display:flex;align-items:baseline;gap:20px;padding:20px 0;border-bottom:1px solid rgba(240,236,228,.05);cursor:pointer;transition:all .2s}
                                                                                                                                                                .chapter-item:hover .chapter-item-title{color:var(--offwhite)}
                                                                                                                                                                    .chapter-item:hover .chapter-item-num{color:var(--ember)}
                                                                                                                                                                        .chapter-item-num{font-family:var(--mono);font-size:.6rem;color:rgba(138,134,128,.5);min-width:28px;transition:color .2s;letter-spacing:.04em}
                                                                                                                                                                            .chapter-item-title{font-family:var(--serif);font-size:1.2rem;color:var(--stone);transition:color .2s;letter-spacing:-.01em}
                                                                                                                                                                                .chapter-item-arrow{margin-left:auto;font-size:.75rem;color:var(--ember);opacity:0;transition:opacity .2s}
                                                                                                                                                                                    .chapter-item:hover .chapter-item-arrow{opacity:1}
                                                                                                                                                                                        #reader{background:var(--black);min-height:100vh}
                                                                                                                                                                                            .reader-nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:24px 48px;background:linear-gradient(to bottom,rgba(10,10,10,1) 60%,transparent);transition:opacity .4s}
                                                                                                                                                                                                .reader-nav.hidden{opacity:0;pointer-events:none}
                                                                                                                                                                                                    .reader-back{font-family:var(--mono);font-size:.65rem;color:var(--stone);letter-spacing:.1em;text-transform:uppercase;cursor:pointer;border:none;background:none;padding:0;transition:color .2s}
                                                                                                                                                                                                        .reader-back:hover{color:var(--offwhite)}
                                                                                                                                                                                                            .reader-chapter-label{font-family:var(--mono);font-size:.62rem;color:var(--stone);letter-spacing:.1em;text-transform:uppercase;font-weight:300}
                                                                                                                                                                                                                .reader-body{max-width:640px;margin:0 auto;padding:140px 32px 80px}
                                                                                                                                                                                                                    .reader-chapter-title{font-family:var(--serif);font-size:clamp(2rem,4vw,3rem);line-height:1.1;color:var(--offwhite);letter-spacing:-.02em;margin-bottom:56px}
                                                                                                                                                                                                                        .reader-content{font-family:var(--serif);font-size:1.18rem;line-height:1.85;color:#d8d4cc;letter-spacing:.008em}
                                                                                                                                                                                                                            .reader-content p{margin-bottom:1.6em}
                                                                                                                                                                                                                                .reader-content h1,.reader-content h2,.reader-content h3{font-family:var(--serif);color:var(--offwhite);margin:2em 0 .8em;letter-spacing:-.01em;line-height:1.2}
                                                                                                                                                                                                                                    .reader-content h1{font-size:1.8rem}.reader-content h2{font-size:1.4rem}.reader-content h3{font-size:1.15rem}
                                                                                                                                                                                                                                        .reader-content em{font-style:italic;color:var(--offwhite)}
                                                                                                                                                                                                                                            .reader-content strong{font-weight:500;color:var(--offwhite)}
                                                                                                                                                                                                                                                .reader-content blockquote{border-left:2px solid var(--ember);padding-left:24px;margin:2em 0;color:var(--stone);font-style:italic}
                                                                                                                                                                                                                                                    .reader-content hr{border:none;border-top:1px solid rgba(240,236,228,.1);margin:3em auto;width:60px}
                                                                                                                                                                                                                                                        .reader-footer{max-width:640px;margin:0 auto;padding:40px 32px 80px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(240,236,228,.06)}
                                                                                                                                                                                                                                                            .reader-nav-btn{font-family:var(--mono);font-size:.65rem;color:var(--stone);letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:none;background:none;padding:0;transition:color .2s}
                                                                                                                                                                                                                                                                .reader-nav-btn:hover{color:var(--ember)}
                                                                                                                                                                                                                                                                    .reader-nav-btn:disabled{opacity:.2;cursor:default}
                                                                                                                                                                                                                                                                        .reader-nav-btn:disabled:hover{color:var(--stone)}
                                                                                                                                                                                                                                                                            .loading{display:flex;align-items:center;justify-content:center;min-height:40vh;flex-direction:column;gap:16px}
                                                                                                                                                                                                                                                                                .loading-dots{display:flex;gap:6px}
                                                                                                                                                                                                                                                                                    .loading-dot{width:6px;height:6px;border-radius:50%;background:var(--ember);animation:pulse 1.2s ease-in-out infinite}
                                                                                                                                                                                                                                                                                        .loading-dot:nth-child(2){animation-delay:.2s}.loading-dot:nth-child(3){animation-delay:.4s}
                                                                                                                                                                                                                                                                                            .loading-text{font-family:var(--mono);font-size:.65rem;color:var(--stone);letter-spacing:.1em;text-transform:uppercase}
                                                                                                                                                                                                                                                                                                @keyframes pulse{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
                                                                                                                                                                                                                                                                                                    .error-msg{font-family:var(--mono);font-size:.75rem;color:var(--ember);letter-spacing:.06em;padding:32px 0;line-height:1.8}
                                                                                                                                                                                                                                                                                                        ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--black)}::-webkit-scrollbar-thumb{background:rgba(201,98,47,.3);border-radius:2px}
                                                                                                                                                                                                                                                                                                            @media(max-width:640px){nav{padding:20px 24px}.hero{padding:140px 24px 60px}.divider{margin:0 24px}.stories-section{padding:48px 24px 80px}.stories-grid{grid-template-columns:1fr;gap:1px}.chapters-view{padding:120px 24px 60px}.reader-nav{padding:20px 24px}.reader-body{padding:120px 24px 60px}.reader-footer{padding:32px 24px 60px}}
                                                                                                                                                                                                                                                                                                                .page{animation:fadeIn .3s ease}
                                                                                                                                                                                                                                                                                                                    @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
                                                                                                                                                                                                                                                                                                                      </style>
                                                                                                                                                                                                                                                                                                                      </head>
                                                                                                                                                                                                                                                                                                                      <body>

                                                                                                                                                                                                                                                                                                                      <div id="home">
                                                                                                                                                                                                                                                                                                                        <nav>
                                                                                                                                                                                                                                                                                                                            <span class="nav-brand" onclick="goHome()">unsung<span>stories</span></span>
                                                                                                                                                                                                                                                                                                                                <span class="nav-meta">by vickydecodes</span>
                                                                                                                                                                                                                                                                                                                                  </nav>
                                                                                                                                                                                                                                                                                                                                    <div id="home-content"></div>
                                                                                                                                                                                                                                                                                                                                    </div>

                                                                                                                                                                                                                                                                                                                                    <div id="reader">
                                                                                                                                                                                                                                                                                                                                      <nav class="reader-nav" id="reader-nav">
                                                                                                                                                                                                                                                                                                                                          <button class="reader-back" id="reader-back-btn">← back</button>
                                                                                                                                                                                                                                                                                                                                              <span class="reader-chapter-label" id="reader-label"></span>
                                                                                                                                                                                                                                                                                                                                                </nav>
                                                                                                                                                                                                                                                                                                                                                  <div class="reader-body">
                                                                                                                                                                                                                                                                                                                                                      <h1 class="reader-chapter-title" id="reader-title"></h1>
                                                                                                                                                                                                                                                                                                                                                          <div class="reader-content" id="reader-content"></div>
                                                                                                                                                                                                                                                                                                                                                            </div>
                                                                                                                                                                                                                                                                                                                                                              <div class="reader-footer">
                                                                                                                                                                                                                                                                                                                                                                  <button class="reader-nav-btn" id="prev-btn" onclick="navigateChapter(-1)">← prev</button>
                                                                                                                                                                                                                                                                                                                                                                      <button class="reader-nav-btn" id="next-btn" onclick="navigateChapter(1)">next →</button>
                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                        </div>

                                                                                                                                                                                                                                                                                                                                                                        <script>
                                                                                                                                                                                                                                                                                                                                                                        // ════════════════════════════════════════════════
                                                                                                                                                                                                                                                                                                                                                                        //  ✏️  EDIT THIS to add your stories & chapters
                                                                                                                                                                                                                                                                                                                                                                        //  Files live at: assets/stories/<folder>/<file>
                                                                                                                                                                                                                                                                                                                                                                        // ════════════════════════════════════════════════
                                                                                                                                                                                                                                                                                                                                                                        const STORIES = [
                                                                                                                                                                                                                                                                                                                                                                          {
                                                                                                                                                                                                                                                                                                                                                                              folder: "the-last-letter",
                                                                                                                                                                                                                                                                                                                                                                                  title: "The Last Letter",
                                                                                                                                                                                                                                                                                                                                                                                      preview: "A letter that was never meant to be found — until now.",
                                                                                                                                                                                                                                                                                                                                                                                          chapters: [
                                                                                                                                                                                                                                                                                                                                                                                                { file: "chap1.md", title: "The Beginning" },
                                                                                                                                                                                                                                                                                                                                                                                                      { file: "chap2.md", title: "What Was Left Behind" },
                                                                                                                                                                                                                                                                                                                                                                                                            { file: "chap3.md", title: "The Ending" },
                                                                                                                                                                                                                                                                                                                                                                                                                ]
                                                                                                                                                                                                                                                                                                                                                                                                                  },
                                                                                                                                                                                                                                                                                                                                                                                                                    {
                                                                                                                                                                                                                                                                                                                                                                                                                        folder: "midnight-calls",
                                                                                                                                                                                                                                                                                                                                                                                                                            title: "Midnight Calls",
                                                                                                                                                                                                                                                                                                                                                                                                                                preview: "Phones ring at 3am for a reason. This is that reason.",
                                                                                                                                                                                                                                                                                                                                                                                                                                    chapters: [
                                                                                                                                                                                                                                                                                                                                                                                                                                          { file: "chap1.md", title: "Ring" },
                                                                                                                                                                                                                                                                                                                                                                                                                                                { file: "chap2.md", title: "Silence" },
                                                                                                                                                                                                                                                                                                                                                                                                                                                    ]
                                                                                                                                                                                                                                                                                                                                                                                                                                                      },
                                                                                                                                                                                                                                                                                                                                                                                                                                                        // Add more stories here:
                                                                                                                                                                                                                                                                                                                                                                                                                                                          // {
                                                                                                                                                                                                                                                                                                                                                                                                                                                            //   folder: "folder-name",
                                                                                                                                                                                                                                                                                                                                                                                                                                                              //   title: "Story Title",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                //   preview: "One line teaser.",
                                                                                                                                                                                                                                                                                                                                                                                                                                                                  //   chapters: [
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    //     { file: "chap1.md", title: "Chapter Title" },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                      //   ]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        // },
                                                                                                                                                                                                                                                                                                                                                                                                                                                                        ];

                                                                                                                                                                                                                                                                                                                                                                                                                                                                        const BASE = "assets/stories";

                                                                                                                                                                                                                                                                                                                                                                                                                                                                        let state = { view: 'home', currentStory: null, currentChapterIndex: 0 };

                                                                                                                                                                                                                                                                                                                                                                                                                                                                        function goHome() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                          state = { view: 'home', currentStory: null, currentChapterIndex: 0 };
                                                                                                                                                                                                                                                                                                                                                                                                                                                                            document.getElementById('reader').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                              document.getElementById('home').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                renderHome();
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  window.scrollTo(0, 0);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  function goStory(i) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    state.view = 'story';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      state.currentStory = i;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('reader').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          document.getElementById('home').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            renderStoryView(STORIES[i], i);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              window.scrollTo(0, 0);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              function openChapter(si, ci) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                state.view = 'reader';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  state.currentStory = si;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    state.currentChapterIndex = ci;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      document.getElementById('home').style.display = 'none';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        document.getElementById('reader').style.display = 'block';
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          loadChapter(si, ci);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            window.scrollTo(0, 0);
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            function renderHome() {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              document.getElementById('home-content').innerHTML = `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <div class="hero page">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <p class="hero-eyebrow">stories that needed to be told</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <h1 class="hero-title">words that<br><em>refused to stay quiet</em></h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <p class="hero-sub">a personal archive. written in solitude, read here.</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="divider"></div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                <div class="stories-section">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <p class="stories-label">all stories</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <div class="stories-grid">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    ${STORIES.map((s, i) => `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="story-card page" onclick="goStory(${i})">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <div class="card-folder">${s.folder}</div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      <h2 class="card-title">${s.title}</h2>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <p class="card-preview">${s.preview}</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <div class="card-footer">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            <span class="card-chapters">${s.chapters.length} chapter${s.chapters.length !== 1 ? 's' : ''}</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <span class="card-arrow">→</span>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        `).join('')}
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              </div>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  </div>`;
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  }

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  function renderStoryView(story, si) {
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    document.getElementById('home-content').innerHTML = `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="chapters-view page">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              <button class="back-btn" onclick="goHome()">← all stories</button>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    <h1 class="chapters-story-title">${story.title}</h1>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          <p class="chapters-story-meta">${story.chapters.length} chapter${story.chapters.length !== 1 ? 's' : ''} · assets/stories/${story.folder}</p>
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                ${story.chapters.map((ch, ci) => `
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        <div class="chapter-item" onclick="openChapter(${si}, ${ci})">
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  <span class="chapter-item-num">${String(ci+1).padStart(2,'0')}</span>
